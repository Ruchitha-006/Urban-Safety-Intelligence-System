{% extends 'base.html' %}

{% block content %}

<div style="width:300px;margin:auto;margin-top:100px;">
    <h2>🔐 Urban Safety Login</h2>

    <form method="POST">
        {% csrf_token %}
        <input name="username" placeholder="Username" style="width:100%;padding:8px;"><br><br>
        <input type="password" name="password" placeholder="Password" style="width:100%;padding:8px;"><br><br>
        <button style="width:100%;padding:10px;background:#007bff;color:white;">Login</button>
    </form>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
</div>

{% endblock %}
